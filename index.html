<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lab 7 Web Teleop</title>
</head>
<body>

<!--Heading-->
<h1>Lab 7: Web Teleop</h1>

<label for="ros-ip-input">ROS bridge IP Address: </label><input id="ros-ip-input" type="text" value="localhost"/>
<button id="set-ros-ip">Set IP</button>

<p>To use:</p>
<ul>
    <li>Run a Rosbridge connection at <code>ws://<span id="connection-address">localhost</span>:9090</code></li>
    <li>Press the column buttons to send translation commands</li>
</ul>
<hr/>

<!--Connection status-->
<p>Connection: <span id="status" style="font-weight: bold;">N/A</span></p>
<hr/>

<!--Column controls-->
<h2>Select a column</h2>
<button id="select-column-1">1 (0m)</button>
<button id="select-column-2">2 (0.5m)</button>
<button id="select-column-3">3 (1m)</button>
<button id="select-column-4">4 (1.5m)</button>
<br>
<br>
<button id="stop">STOP</button>
<hr/>

<p>Progress: <span id="feedback-status" style="font-weight: bold;">N/A</span></p>
<hr/>

<h2>Camera Feed</h2>

<label for="camera-topic-input">Camera Topic:</label><input id="camera-topic-input" type="text"
                                                            value="/camera/color/image_raw/compressed"/>
<button id="set-camera-topic">Set Topic</button>

<img
        id="camera-feed"
        alt="Robot camera feed"
        style="max-width: 100%; height: auto; rotate: 90deg; margin-top: 100px;"
/>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
